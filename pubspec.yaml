name: stage_3d
description: "Flutter 3D plugin with Google Filament rendering and Jolt Physics for GLB models, scene nodes, lighting, animation, and spatial queries."
version: 0.1.0-alpha.1
topics:
  - flutter
  - 3d
  - jolt
  - physics
  - filament

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.stage3d.stage_3d
        pluginClass: Stage3DPlugin

  uses-material-design: true
