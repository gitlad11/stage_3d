name: stage_3d
description: "Flutter 3D plugin with Google Filament rendering and Jolt Physics for GLB models, scene nodes, lighting, animation, and spatial queries."
version: 0.1.0-alpha.6
repository: https://github.com/gitlad11/stage_3d
issue_tracker: https://github.com/gitlad11/stage_3d/issues
executables:
  convert_model:
  convert_models:
topics:
  - flutter
  - three-d
  - jolt
  - physics
  - filament

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.stage3d.stage_3d
        pluginClass: Stage3DPlugin

  assets:
    - assets/models/Fox.glb
    - assets/models/TreePack.obj
    - assets/models/mighty_oak_trees.glb
    - assets/textures/grass_pbr_atlas.png
    - assets/material_sources/grass_wind.mat
    - assets/material_sources/grass_wind.shader
    - assets/material_sources/water.shader
    - assets/materials/grass_wind.filamat
    - assets/materials/water.filamat

  uses-material-design: true
